name = "meme-capsule"
compatibility_date = "2024-12-18"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "meme-capsule-db"
database_id = "64e2bb16-1557-4d53-8e6b-5197c8636d09"

[[r2_buckets]]
binding = "MEMES_BUCKET"
bucket_name = "memes"

# Analytics KV cache namespace
# Created via Cloudflare dashboard
[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "078fce53803845b3a47751baef405341"

# Cron trigger for analytics aggregation worker
# Uncomment after deploying the worker separately
# [triggers]
# crons = ["*/30 * * * *"]
